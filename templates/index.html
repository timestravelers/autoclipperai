<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Viral Shorts AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4">Auto Clip YouTube Video to Viral Short 9:16</h1>
    <form id="shortForm" class="mb-3">
      <div class="mb-3">
        <label for="youtube_url" class="form-label">Link YouTube</label>
        <input id="youtube_url" name="youtube_url" type="text" required class="form-control" placeholder="https://youtube.com/watch?..."/>
      </div>
      <button class="btn btn-primary" type="submit">Proses Video Short</button>
    </form>
    <div id="progressSection" style="display:none;">
      <div class="progress mb-2">
        <div id="progressBar" class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%;">0%</div>
      </div>
      <div id="progressStatus"></div>
    </div>
    <div id="resultSection"></div>
    <div id="historySection" class="mt-5">
      <h3>Riwayat Clip</h3>
      <ul id="histList" class="list-group"></ul>
    </div>
  </div>
<script>
$(document).ready(function(){
  // submit form
  $('#shortForm').on('submit', function(e){
    e.preventDefault();
    const url = $('#youtube_url').val();
    $('#progressSection').show();
    $('#progressBar').css('width', '0%').text('0%');
    $('#progressStatus').text('Mengirim permintaan...');
    $('#resultSection').empty();
    axios.post('/short', {youtube_url:url}).then(res=>{
      const {task_id} = res.data;
      pollProgress(task_id);
    });
  });
  function pollProgress(task_id){
    axios.get('/status/'+task_id).then(res=>{
      let data=res.data;
      let percent= data.progress || 0;
      let status= data.status || "";
      $('#progressBar').css('width', percent+'%').text(percent+'%');
      $('#progressStatus').text(status);
      if(data.state=='SUCCESS' && data.result_url){
        $('#resultSection').html(`<div class='alert alert-success'><a href='${data.result_url}' class='btn btn-success' download>Download Short</a><br><video src='${data.result_url}' controls style='max-width:300px;margin-top:10px;'></video></div>`);
        updateHistory();
        $('#progressSection').hide();
      } else if(data.state=='FAILURE'){
        $('#resultSection').html(`<div class='alert alert-danger'>Terjadi error saat proses: ${data.error}</div>`);
        $('#progressSection').hide();
      } else {
        setTimeout(()=>pollProgress(task_id),1500);
      }
    });
  }
  function updateHistory(){
    axios.get('/history').then(res=>{
      let html = res.data.map(item=>`<li class='list-group-item'><code>${item.youtube_url}</code> &rarr; <a href='${item.result_url}' target='_blank'>Download</a></li>`).join('');
      $('#histList').html(html);
    });
  }
  updateHistory();
});
</script>
</body>
</html>
